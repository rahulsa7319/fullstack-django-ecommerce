{% if messages %}
<div class="brand-notify-container">
  {% for message in messages %}
    <div class="brand-toast 
        {% if message.tags == 'error' %}toast-error
        {% elif message.tags == 'success' %}toast-success
        {% elif message.tags == 'warning' %}toast-warning
        {% else %}toast-info{% endif %}" role="alert">
      
      <div class="toast-content-wrapper">
        <div class="toast-icon-box">
          {% if message.tags == 'error' %}
            <i class="fas fa-exclamation-circle"></i>
          {% elif message.tags == 'success' %}
            <i class="fas fa-check-circle"></i>
          {% elif message.tags == 'warning' %}
            <i class="fas fa-triangle-exclamation"></i>
          {% else %}
            <i class="fas fa-info-circle"></i>
          {% endif %}
        </div>
        
        <div class="toast-message-text">{{ message }}</div>
        
        <button type="button" class="toast-dismiss-btn" onclick="this.closest('.brand-toast').classList.add('toast-exit-anim')">
          <i class="fas fa-times"></i>
        </button>
      </div>
    </div>
  {% endfor %}
</div>

<style>
  :root {
    --brand-dark-green: #064e3b; /* Matches your Logo color */
    --brand-error-red: #991b1b;
    --brand-warning-orange: #92400e;
    --brand-info-blue: #075985;
  }

  .brand-notify-container {
    position: fixed;
    top: 100px; /* Positioned clearly below the navbar */
    right: 25px;
    z-index: 11000;
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 380px;
    max-width: calc(100vw - 50px);
  }

  .brand-toast {
    color: #ffffff;
    border-radius: 14px;
    padding: 16px 20px;
    box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2), 0 4px 6px -2px rgba(0, 0, 0, 0.1);
    animation: toastSlideInRight 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
    position: relative;
    border: 1px solid rgba(255, 255, 255, 0.1);
    transition: transform 0.3s ease, opacity 0.3s ease;
  }

  .toast-content-wrapper {
    display: flex;
    align-items: center;
    gap: 15px;
  }

  .toast-icon-box {
    font-size: 1.4rem;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .toast-message-text {
    font-family: 'Inter', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    line-height: 1.4;
    flex-grow: 1;
  }

  .toast-dismiss-btn {
    background: rgba(255, 255, 255, 0.15);
    border: none;
    color: #ffffff;
    width: 28px;
    height: 28px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s ease;
    flex-shrink: 0;
  }

  .toast-dismiss-btn:hover {
    background: rgba(255, 255, 255, 0.3);
    transform: rotate(90deg);
  }

  /* Solid Color Themes */
  .toast-success { background: var(--brand-dark-green); }
  .toast-error { background: var(--brand-error-red); }
  .toast-warning { background: var(--brand-warning-orange); }
  .toast-info { background: var(--brand-info-blue); }

  /* Animations */
  @keyframes toastSlideInRight {
    0% { transform: translateX(100%) scale(0.9); opacity: 0; }
    100% { transform: translateX(0) scale(1); opacity: 1; }
  }

  @keyframes toastFadeOutDown {
    0% { transform: translateY(0) scale(1); opacity: 1; }
    100% { transform: translateY(20px) scale(0.95); opacity: 0; }
  }

  .toast-exit-anim {
    animation: toastFadeOutDown 0.4s ease forwards !important;
  }

  @media (max-width: 480px) {
    .brand-notify-container {
      top: 85px;
      right: 15px;
      left: 15px;
      width: auto;
    }
  }
</style>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    const toasts = document.querySelectorAll('.brand-toast');
    toasts.forEach(toast => {
      // Auto-exit after 5 seconds
      setTimeout(() => {
        if (toast && !toast.classList.contains('toast-exit-anim')) {
          toast.classList.add('toast-exit-anim');
          setTimeout(() => toast.remove(), 400);
        }
      }, 5000);
    });
  });
</script>
{% endif %}
