{% extends "base.html" %}
{% load static %}

{% block title %}Add Category - Admin Page Happing{% endblock title %}

{% block content %}
<div class="admin-form-container py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="premium-glass-card shadow-lg p-0 border-0" style="border-radius: var(--radius-2xl); overflow: hidden;">
                    <!-- Header Section -->
                    <div class="p-4 p-md-5 text-white" style="background: linear-gradient(135deg, var(--brand-green-dark) 0%, var(--brand-green-light) 100%);">
                        <div class="d-flex align-items-center mb-3">
                            <div class="icon-box me-3" style="width: 50px; height: 50px; background: rgba(255,255,255,0.2); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem;">
                                <i class="fas fa-folder-plus"></i>
                            </div>
                            <h2 class="h3 mb-0 fw-bold" style="font-family: 'Plus Jakarta Sans';">New Category</h2>
                        </div>
                        <p class="opacity-75 mb-0">Organize your shop by adding a new product category.</p>
                    </div>

                    <!-- Form Section -->
                    <div class="p-4 p-md-5 bg-white">
                        <form method="POST" enctype="multipart/form-data" class="premium-form">
                            {% csrf_token %}
                            
                            <div class="mb-4">
                                <label class="form-label-p">Category Name</label>
                                <div class="input-group-premium">
                                    <i class="fas fa-heading"></i>
                                    <input type="text" name="name" class="form-control-p" placeholder="e.g. Footwear" required>
                                </div>
                            </div>

                            <div class="mb-4">
                                <div class="form-check-premium p-3 rounded-4 d-flex align-items-center" style="background: var(--green-soft); border: 2px solid var(--brand-green-light);">
                                    <div class="custom-checkbox me-3">
                                        <input type="checkbox" name="is_featured" id="is_featured" style="width: 22px; height: 22px; cursor: pointer; accent-color: var(--brand-green-dark);">
                                    </div>
                                    <label class="form-check-label fw-bold mb-0 text-dark" for="is_featured" style="cursor: pointer;">
                                        Add this category to the <span class="text-success">Featured section</span>
                                    </label>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label-p">Category Image</label>
                                <div class="input-group-premium">
                                    <i class="fas fa-image"></i>
                                    <input type="file" name="image" class="form-control-p" accept="image/*">
                                </div>
                                <small class="text-muted mt-2 d-block">Upload a representative image for this category.</small>
                            </div>

                            <div class="d-flex flex-column gap-3 pt-4 border-top border-light">
                                <button type="submit" class="btn-p btn-p-green w-100 py-3 justify-content-center">
                                    <i class="fas fa-plus-circle me-2"></i>Create Category
                                </button>
                                <a href="{% url 'home' %}" class="btn-p btn-p-outline w-100 justify-content-center">Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    :root {
        --brand-green-dark: #064e3b;
        --brand-green-light: #59ab6e;
        --green-soft: #ecfdf5;
    }

    .admin-form-container {
        background-color: var(--p-bg);
        min-height: 80vh;
    }

    .form-label-p {
        display: block;
        font-weight: 700;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--p-text-head);
        margin-bottom: 0.75rem;
    }

    .input-group-premium {
        position: relative;
        display: flex;
        align-items: center;
    }

    .input-group-premium i {
        position: absolute;
        left: 20px;
        color: var(--p-text-muted);
        transition: var(--transition);
        z-index: 5;
    }

    .form-control-p {
        width: 100%;
        padding: 14px 20px 14px 55px;
        border-radius: var(--radius-lg);
        border: 2px solid var(--p-border);
        background: #f8fafc;
        font-weight: 500;
        transition: var(--transition);
    }

    .form-control-p:focus {
        outline: none;
        border-color: var(--brand-green-light);
        background: white;
        box-shadow: 0 0 0 4px var(--green-soft);
    }

    .form-control-p:focus + i {
        color: var(--brand-green-dark);
    }

    /* Style for file input to look like other inputs */
    input[type="file"].form-control-p {
        padding-top: 10px;
    }

    .btn-p-green {
        background: var(--brand-green-dark);
        color: white !important;
        border-radius: 100px;
        font-weight: 700;
        transition: all 0.3s ease;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 10px;
    }

    .btn-p-green:hover {
        background: #042f24;
        transform: translateY(-3px);
        box-shadow: 0 10px 20px -5px rgba(6, 78, 59, 0.3);
    }
</style>
{% endblock content %}
